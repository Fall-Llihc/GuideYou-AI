<svg
  width="240"
  height="240"
  viewBox="0 0 240 240"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
  role="img"
  aria-label="GuideYou&amp;AI logo"
>
  <!-- Dark circular background -->
  <circle cx="120" cy="120" r="112" fill="#161a21" stroke="#262c37" stroke-width="1.5" />

  <!-- Glow behind pin -->
  <circle cx="120" cy="110" r="70" fill="url(#glow)" opacity=".35" />

  <!-- Map pin body -->
  <path
    d="M120 42c-30.4 0-55 24.6-55 55 0 41.2 55 101 55 101s55-59.8 55-101c0-30.4-24.6-55-55-55z"
    fill="url(#pinGrad)"
    opacity=".9"
  />

  <!-- Pin inner circle, dark cutout -->
  <circle cx="120" cy="95" r="26" fill="#161a21" />

  <!-- Compass center dot and dashed ring -->
  <circle cx="120" cy="95" r="8" fill="#e8a04a" />
  <circle
    cx="120" cy="95" r="12"
    fill="none"
    stroke="#e8a04a"
    stroke-width="1.5"
    stroke-dasharray="3 3"
    opacity=".7"
  />

  <!-- Compass spokes, jade color -->
  <line x1="120" y1="83" x2="120" y2="72" stroke="#5fb09b" stroke-width="2" stroke-linecap="round" opacity=".8" />
  <line x1="132" y1="89" x2="141" y2="81" stroke="#5fb09b" stroke-width="2" stroke-linecap="round" opacity=".8" />
  <line x1="132" y1="101" x2="141" y2="109" stroke="#5fb09b" stroke-width="2" stroke-linecap="round" opacity=".8" />
  <line x1="120" y1="107" x2="120" y2="118" stroke="#5fb09b" stroke-width="2" stroke-linecap="round" opacity=".8" />
  <line x1="108" y1="101" x2="99" y2="109" stroke="#5fb09b" stroke-width="2" stroke-linecap="round" opacity=".8" />
  <line x1="108" y1="89" x2="99" y2="81" stroke="#5fb09b" stroke-width="2" stroke-linecap="round" opacity=".8" />

  <!-- Compass spoke endpoints -->
  <circle cx="120" cy="72" r="3" fill="#5fb09b" />
  <circle cx="141" cy="81" r="3" fill="#5fb09b" />
  <circle cx="141" cy="109" r="3" fill="#5fb09b" />
  <circle cx="120" cy="118" r="3" fill="#5fb09b" />
  <circle cx="99" cy="109" r="3" fill="#5fb09b" />
  <circle cx="99" cy="81" r="3" fill="#5fb09b" />

  <!-- Route dots at bottom -->
  <path
    d="M90 185 Q105 170 120 175 Q135 180 150 165"
    stroke="#e8a04a"
    stroke-width="2.5"
    stroke-linecap="round"
    fill="none"
    stroke-dasharray="6 4"
    opacity=".6"
  />
  <circle cx="90" cy="185" r="3.5" fill="#d9684e" />
  <circle cx="120" cy="175" r="3.5" fill="#e8a04a" />
  <circle cx="150" cy="165" r="3.5" fill="#5fb09b" />

  <!-- Outer dashed orbit ring -->
  <ellipse
    cx="120" cy="120" rx="100" ry="100"
    fill="none"
    stroke="#f4ede2"
    stroke-width=".6"
    stroke-dasharray="4 6"
    opacity=".15"
  />

  <defs>
    <radialGradient id="glow" cx=".5" cy=".4" r=".6">
      <stop offset="0%" stop-color="#e8a04a" stop-opacity=".4" />
      <stop offset="100%" stop-color="#e8a04a" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="pinGrad" x1="120" y1="42" x2="120" y2="198" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e8a04a" />
      <stop offset="100%" stop-color="#d9684e" />
    </linearGradient>
  </defs>
</svg>
