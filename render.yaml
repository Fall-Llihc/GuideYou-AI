# render.yaml — Infrastructure-as-code for Render.com
#
# Usage:
#   1. Push this file to your main branch.
#   2. In Render dashboard → "New +" → "Blueprint" → connect this repo.
#   3. Render reads this file and provisions the service automatically.
#
# After first deploy, set the actual GROQ_API_KEY in the Render dashboard
# (envVars marked sync:false are NOT pulled from this file — they must be
# entered manually for security).
#
# Update ALLOWED_ORIGINS to your Vercel URL once frontend is live, e.g.:
#   ALLOWED_ORIGINS=https://bandung-travel.vercel.app

services:
  - type: web
    name: bandung-travel-api
    runtime: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: GROQ_API_KEY
        sync: false
